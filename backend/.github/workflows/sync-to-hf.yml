name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] 

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # GANTI "nupers/gascopez" DENGAN USERNAME/NAMASPACE LU DI HUGGING FACE
          git push --force https://nupers:$HF_TOKEN@huggingface.co/spaces/nupers/gascopez main